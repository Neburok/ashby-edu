- id: rodillo-transportador
  nombre: Rodillo transportador (línea de producción)
  sector: Línea de producción / Manejo de materiales
  funcion: Soportar y mover productos sobre banda transportadora, resistir desgaste por fricción y carga
  proceso: Extrusión + maquinado (metal), moldeo (plástico)
  volumen: Lotes de 200–1,000 unidades
  restricciones:
