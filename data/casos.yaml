    - Aluminio 6061
    - PVC
    - Nylon 6
  ashby_config:
    x_col: densidad_gcm3
    y_col: E_GPa
    index_line_slope: 1.0
    index_line_intercept: 30.0
  es_rector: false

- id: inserto-herramienta-corte
  nombre: Inserto de herramienta de corte (torneado)
  sector: Maquinado / Manufactura
  funcion: Remover viruta de pieza metálica, resistir altas temperaturas y desgaste abrasivo
  proceso: Sinterizado (metalurgia de polvos) + recubrimiento CVD/PVD
  volumen: Producción en masa (piezas de consumo)
  restricciones:
    - Dureza en caliente
    - Resistencia al desgaste
    - Tenacidad
    - Estabilidad química con material de pieza
  normas:
    - ISO 1832 (insertos de corte)
    - ANSI B212
  candidatos:
    - Carburo de tungsteno (WC-Co)
    - Acero rápido (HSS)
    - Cerámico (Al₂O₃)
    - CBN (nitruro de boro cúbico)
  ashby_config:
    x_col: dureza_HB
    y_col: sigma_UTS_MPa
    index_line_slope: 1.0
    index_line_intercept: 2.0
  es_rector: false

