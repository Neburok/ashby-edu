- id: carcasa-taladro
  nombre: Carcasa de taladro eléctrico manual
  sector: Herramientas / Manufactura
  funcion: Proteger motor, aislar corriente, disipar calor, resistir impacto, ergonomía
  proceso: Moldeo por inyección (plásticos) o fundición a presión (metales)
  volumen: 100,000+ unidades/año
  restricciones:
    - Aislamiento eléctrico
    - Resistencia a caídas (1.5 m)
    - Costo < 2 USD
    - Acabado estético
  normas:
    - NOM-003-SCFI (seguridad eléctrica)
    - ASTM D256 (impacto Izod)
  candidatos:
    - ABS
    - PC/ABS
    - PP+GF
    - Al/Zamak
  ashby_config:
    x_col: densidad_gcm3
    y_col: sigma_y_MPa
    index_line_slope: 1.0
    index_line_intercept: 50.0
  es_rector: true

- id: botella-bebida-carbonatada
  nombre: Botella de bebida carbonatada
  sector: Empaque / Alimentos y bebidas
  funcion: Contener líquido carbonatado a presión, ligera, reciclable, inocua
  proceso: Inyección-soplado (PET), soplado (vidrio), embutido profundo (aluminio)
  volumen: Millones de unidades/año
  restricciones:
    - Presión interna (CO₂)
    - Ligereza
    - Costo ínfimo
    - Reciclabilidad
    - Contacto alimenticio
  normas:
    - NOM-186-SSA1 (contacto con alimentos)
    - NMX-E-043-SCFI
  candidatos:
    - PET
    - Vidrio
    - Aluminio
    - PLA (bioplástico)
  ashby_config:
    x_col: densidad_gcm3
    y_col: sigma_UTS_MPa
    index_line_slope: 1.0
    index_line_intercept: 20.0
  es_rector: false

- id: tarima-industrial-pallet
  nombre: Tarima industrial (pallet)
  sector: Logística / Almacenamiento
  funcion: Soportar carga estática y dinámica, compatible con montacargas, apilable, reutilizable
  proceso: Moldeo por inyección (plástico), ensamble mecánico (madera), perfilado (acero)
  volumen: Lotes de 5,000–50,000 unidades
  restricciones:
    - Carga estática > 1,000 kg
    - Resistencia a humedad
    - Durabilidad
    - Costo de retorno logístico
  normas:
    - ISO 8611 (ensayos de tarimas)
    - NOM-006-SCFI (madera para embalaje)
  candidatos:
    - Madera de pino
    - PP reciclado
    - Acero estructural
    - Composite madera-plástico (WPC)
  ashby_config:
    x_col: densidad_gcm3
    y_col: sigma_y_MPa
    index_line_slope: 0.5
    index_line_intercept: 30.0
  es_rector: false

- id: tuberia-proceso-alimentos
  nombre: Tubería para proceso (planta de alimentos)
  sector: Alimentos / Químicos
  funcion: Conducir fluidos de proceso, soportar presión y temperatura
  proceso: Extrusión (plástico), laminación + soldadura (acero inox), trefilado (cobre)
  volumen: Metros lineales, producción por lote
  restricciones:
    - Resistencia a corrosión
    - Inocuidad alimenticia
    - Rango de temperatura
    - Presión de trabajo
    - Limpieza CIP/SIP
  normas:
    - NSF/ANSI 51 (contacto alimenticio)
    - ASTM A312 (tubo acero inox)
  candidatos:
    - Acero inox 304
    - Acero inox 316L
    - PEX
    - CPVC
  ashby_config:
    x_col: densidad_gcm3
    y_col: sigma_y_MPa
    index_line_slope: 1.0
    index_line_intercept: 100.0
  es_rector: false

- id: engrane-transmision
  nombre: Engrane de transmisión (reductor de velocidad)
  sector: Manufactura / Maquinaria
  funcion: Transmitir torque entre ejes, resistir desgaste superficial y fatiga por contacto
  proceso: Forja + maquinado + tratamiento térmico (temple/revenido)
  volumen: Lotes de 500–5,000 unidades
  restricciones:
    - Resistencia a fatiga
    - Dureza superficial
    - Maquinabilidad
    - Templabilidad
  normas:
    - AGMA 2001 (engranes)
    - ASTM A370 (ensayos mecánicos)
  candidatos:
    - AISI 4140
    - AISI 1045
    - Bronce SAE 64
    - Nylon 6/6
  ashby_config:
    x_col: dureza_HB
    y_col: sigma_UTS_MPa
    index_line_slope: 1.0
    index_line_intercept: 5.0
  es_rector: false

- id: gabinete-electrico-nema4
  nombre: Gabinete eléctrico industrial (NEMA 4)
  sector: Electrónica industrial / Control
  funcion: Proteger componentes eléctricos de polvo, agua, impacto; aislar; blindaje EM opcional
  proceso: Corte + doblez + soldadura (metal), moldeo por inyección (plástico)
  volumen: Lotes de 100–1,000 unidades
  restricciones:
    - Grado de protección IP66/NEMA 4
    - Resistencia a impacto (IK)
    - Aislante o conductor según diseño
