    - IEC 60529 (protección IP)
    - NOM-001-SEDE (instalaciones eléctricas)
  candidatos:
    - Acero al carbón pintado
    - Aluminio
    - ABS
    - PRFV (poliéster reforzado con fibra de vidrio)
  ashby_config:
    x_col: densidad_gcm3
    y_col: sigma_y_MPa
    index_line_slope: 1.0
    index_line_intercept: 80.0
  es_rector: false

- id: contenedor-residuos-industriales
  nombre: Contenedor de residuos industriales
  sector: Planta industrial / Manejo de residuos
  funcion: Contener residuos sólidos o líquidos, resistir químicos, manipulación ruda, apilable
  proceso: Moldeo rotacional (PEAD), inyección (plástico), rolado + soldadura (acero)
  volumen: Lotes de 500–2,000 unidades
  restricciones:
    - Resistencia química
    - Resistencia UV (intemperie)
    - Ligereza para manipulación
    - Reciclabilidad
  normas:
